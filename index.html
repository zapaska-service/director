<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ЗАПАСКА СЕРВИС</title>
    <!-- Подключение манифеста для блокировки белых вспышек операционной системы телефона -->
  <link rel="manifest" href="manifest.json">


  <!-- Полная интеграция под автономное мобильное приложение -->
  <meta name="theme-color" content="#060606">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ЗАПАСКА СЕРВИС">

  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; background:#060606; overflow:hidden; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; user-select: none; }
    
    /* ФОН С ТЕМНЫМ РАДИАЛЬНЫМ ГРАДИЕНТОМ ИЗ ЦЕНТРА */
    .splash-screen {
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: #060606; 
      background-image: radial-gradient(circle at center, #161616 0%, #060606 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 9999999; opacity: 1; 
      /* Увеличили плавность растворения до 0.9 сек */
      transition: opacity 0.9s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.9s;
    }
    .splash-screen.fade-out { opacity: 0; visibility: hidden; }
    
    /* МАКСИМАЛЬНЫЙ РАЗМЕР И МОЩНОЕ МНОГОСЛОЙНОЕ НЕОНОВОЕ СВЕЧЕНИЕ С ЭФФЕКТОМ ПУЛЬСАЦИИ */
    .splash-logo {
      width: 200px; height: 200px; margin-bottom: 32px;
      opacity: 0; transform: scale(0.9);
      animation-fill-mode: forwards;
      animation-name: neonPulse, fadeInLogo;
      animation-duration: 3s, 1s;
      animation-iteration-count: infinite, 1;
      animation-timing-function: ease-in-out, cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    /* ПРЕМИАЛЬНЫЕ МАССИВНЫЕ БУКВЫ С ЭФФЕКТОМ ОТРАЖЕНИЯ СВЕТА */
    .logo-text-main { 
      font-size: 38px; 
      font-weight: 900; 
      color: #faad14; 
      letter-spacing: 8px; 
      text-transform: uppercase; 
      margin-bottom: 4px; 
      text-shadow: 0 0 10px rgba(250,173,20,0.5), 0 0 25px rgba(250,173,20,0.2);
      opacity: 0; animation: fadeInComponent 0.9s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
    }
    .logo-text-sub { 
      font-size: 14px; 
      font-weight: 800; 
      color: #555555; 
      letter-spacing: 12px; 
      text-transform: uppercase; 
      margin-bottom: 50px;
      margin-left: 10px;
      opacity: 0; animation: fadeInComponent 0.9s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards;
    }
    
    /* СТИЛЬНЫЙ ИНДИКАТОР ЗАГРУЗКИ */
    .loader-container {
      display: flex; flex-direction: column; align-items: center;
      opacity: 0; animation: fadeInComponent 0.9s cubic-bezier(0.25, 1, 0.5, 1) 0.7s forwards;
    }
    .loader-bar { width: 220px; height: 4px; background: #1a1a1a; border-radius: 4px; overflow: hidden; position: relative; border: 1px solid #111; }
    .loader-bar-progress { position: absolute; height: 100%; background: #faad14; width: 0; animation: loadProgress 2s forwards cubic-bezier(0.22, 1, 0.36, 1); box-shadow: 0 0 15px #faad14, 0 0 5px #ffffff; }
    .loader-caption { font-size: 11px; font-weight: 800; color: #3a3a3a; text-transform: uppercase; letter-spacing: 2px; margin-top: 12px; }

    /* ЭФФЕКТ ПЛАВНОГО НАРАСТАНИЯ ДЛЯ КЛИЕНТСКОГО ПРИЛОЖЕНИЯ */
    .app-frame {
      position: fixed; top:0; left:0; bottom:0; right:0; 
      width:100%; height:100%; border:none; margin:0; padding:0; 
      overflow:hidden; z-index:99999;
      opacity: 0; /* Изначально полностью скрываем, чтобы не моргал белый фон */
      transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .app-frame.visible { opacity: 1; }

    /* КАРДИНАЛЬНО УЛУЧШЕННЫЕ АНИМАЦИИ СВЕЧЕНИЯ И ВХОДА */
    @keyframes neonPulse {
      0%, 100% { 
        transform: scale(1); 
        filter: drop-shadow(0 0 12px rgba(250,173,20,0.4)) drop-shadow(0 0 30px rgba(250,173,20,0.2)) drop-shadow(0 0 50px rgba(250,173,20,0.1)); 
      }
      50% { 
        transform: scale(1.02); 
        filter: drop-shadow(0 0 20px rgba(250,173,20,0.8)) drop-shadow(0 0 45px rgba(250,173,20,0.5)) drop-shadow(0 0 75px rgba(250,173,20,0.25)); 
      }
    }
    @keyframes fadeInLogo { 0% { opacity: 0; transform: scale(0.85) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes fadeInComponent { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes loadProgress { 0% { width: 0; } 80% { width: 90%; } 100% { width: 100%; } }
  </style>
</head>
<body>

  <!-- МАКСИМАЛЬНО СОЛИДНЫЙ ЭКРАН ЗАСТАВКИ -->
  <div id="splash" class="splash-screen">
    <svg class="splash-logo" viewBox="0 0 24 24" fill="none" xmlns="http://w3.org">
      <circle cx="12" cy="12" r="10.5" stroke="#faad14" stroke-width="1.2" stroke-dasharray="1 1.5"/>
      <circle cx="12" cy="12" r="9.5" stroke="#faad14" stroke-width="0.8"/>
      <circle cx="12" cy="12" r="8.2" stroke="#faad14" stroke-width="1.8"/>
      <circle cx="12" cy="12" r="5" stroke="#faad14" stroke-width="0.5" stroke-dasharray="0.5 0.8"/>
      <circle cx="12" cy="12" r="2.2" stroke="#faad14" stroke-width="2"/>
      <circle cx="12" cy="12" r="0.6" fill="#ffffff"/>
      <path d="M12 2V6M12 18V22M2 12H6M18 12H22M4.93 4.93L7.8 7.8M16.2 16.2L19.07 19.07M19.07 4.93L16.2 7.8M7.8 16.2L4.93 19.07" stroke="#faad14" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M12 3.8V5.2M12 18.8V20.2M3.8 12H5.2M18.8 12H20.2" stroke="#ffffff" stroke-width="0.8"/>
    </svg>
    
    <div class="logo-text-main">ЗАПАСКА</div>
    <div class="logo-text-sub">С Е Р В И С</div>
    
    <div class="loader-container">
      <div class="loader-bar"><div class="loader-bar-progress"></div></div>
      <div class="loader-caption">Загрузка системы...</div>
    </div>
  </div>

  <!-- ОНЛАЙН-ПРИЛОЖЕНИЕ С КЛАССОМ ПЛАВНОГО ПОЯВЛЕНИЯ -->
  <iframe id="appFrame" class="app-frame" src="https://script.google.com/macros/s/AKfycbwSwFwLJibkUW3XzZeWvqhL-AEq-Ze1WD20SNj2WIfVXzj_AW_RGN4eR16Er1ZKXpSKEw/exec"></iframe>

  <script>
    // Запускаем переключение экранов через 2 секунды (когда прогресс-бар добежал до конца)
    setTimeout(function() {
      var splash = document.getElementById('splash');
      var frame = document.getElementById('appFrame');
      
      if (splash) {
        splash.classList.add('fade-out'); // Плавно гасим неоновую заставку
      }
      if (frame) {
        frame.classList.add('visible'); // Одновременно и плавно проявляем само приложение
      }
    }, 2000);
  </script>

</body>
</html>
